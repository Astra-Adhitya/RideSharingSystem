<!DOCTYPE html>
<html>
<head>
    <title>Ride Data</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b0b0b;
            color: white;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #111;
        }

        th, td {
            padding: 12px;
        }

        th {
            background: #1c1c1c;
        }

        tr {
            border-bottom: 1px solid #222;
        }

        tr:hover {
            background: #1a1a1a;
        }

        a {
            color: #00d4ff;
            text-decoration: none;
        }
    </style>
</head>

<body>

<h1>📊 Ride Data</h1>

<table>
    <tr>
        <th>Data 1</th>
        <th>Data 2</th>
        <th>Data 3</th>
        <th>Data 4</th>
    </tr>

    {% for ride in rides %}
    <tr>
        {% for value in ride %}
        <td>{{ value }}</td>
        {% endfor %}
    </tr>
    {% endfor %}
</table>

<br>
<a href="/">← Back to Dashboard</a>

</body>
</html>
