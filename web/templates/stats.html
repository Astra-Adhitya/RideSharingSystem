<!DOCTYPE html>
<html>
<head>
    <title>Ride Stats</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b0b0b;
            color: white;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: #111;
            padding: 20px;
            border-radius: 12px;
        }

        canvas {
            width: 100% !important;
            height: 450px !important;
        }

        a {
            color: #00d4ff;
            text-decoration: none;
        }
    </style>
</head>

<body>

<h1>📈 Ride Statistics</h1>

<div class="container">

    <div class="card">
        <h3>Revenue Overview</h3>
        <canvas id="revenueChart"></canvas>
    </div>

    <div class="card">
        <h3>Ride Distribution</h3>
        <canvas id="rideChart"></canvas>
    </div>

</div>

<br>
<a href="/">← Back to Dashboard</a>

<script>
    // Revenue Chart (Line)
    new Chart(document.getElementById("revenueChart"), {
        type: 'line',
        data: {
            labels: ["Mon", "Tue", "Wed", "Thu", "Fri"],
            datasets: [{
                label: "Revenue (₹)",
                data: [200, 450, 300, 600, 700],
                borderColor: "#00d4ff",
                backgroundColor: "rgba(0,212,255,0.1)",
                fill: true,
                tension: 0.4
            }]
        },
        options: {
            plugins: { legend: { labels: { color: "white" } } },
            scales: {
                x: { ticks: { color: "white" } },
                y: { ticks: { color: "white" } }
            }
        }
    });

    // Ride Type Chart (Doughnut)
    new Chart(document.getElementById("rideChart"), {
        type: 'doughnut',
        data: {
            labels: ["Completed", "Cancelled", "Ongoing"],
            datasets: [{
                data: [70, 10, 20],
                backgroundColor: ["#00ffae", "#ff4d4d", "#00d4ff"]
            }]
        },
        options: {
            plugins: { legend: { labels: { color: "white" } } }
        }
    });
</script>

</body>
</html>
